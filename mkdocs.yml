site_name: Tether
site_description: A cross-platform single-molecule FRET desktop suite (Mondragón Lab, Northwestern).
# KEEP THIS AT THE PAGES ROOT — do not "fix" it to a versioned or /latest/ URL.
# `mike deploy` injects its own mkdocs plugin and rewrites site_url to
# urljoin(site_url, <version>) at build time (mike/mkdocs_plugin.py::on_config), so the
# published 1.0 tree already gets canonicals and a sitemap under /tether/1.0/. Pointing
# this at /tether/latest/ would produce /tether/latest/1.0/... — a URL that does not
# exist. A plain `mkdocs build` (the required docs-build gate) sets no MIKE_DOCS_VERSION
# and so renders the un-versioned root; that is the gate's output, not the site's.
site_url: https://bioedca.github.io/tether/
repo_url: https://github.com/bioedca/tether
repo_name: bioedca/tether
copyright: Copyright &copy; 2026 The Tether Authors — GPL-3.0-or-later

theme:
  name: material
  # Use the visitor's system fonts — do NOT load Google Fonts. This keeps the site
  # free of any third-party asset request (no visitor IP sent to Google), matching
  # the "no third-party" statement in docs/privacy.md.
  font: false
  features:
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Glossary: glossary.md
  - Troubleshooting: troubleshooting.md
  - Import:
      - Legacy Deep-LASI import: io/legacy-import.md
  - Idealization:
      - Standalone-tMAVEN hand-off: idealize/standalone-tmaven-handoff.md
  - Analysis:
      - Seven-plot parity gallery: analysis/parity-gallery.md
  - Machine learning:
      - Deep trace classifier (GPU add-on): ml/deep-classifier.md
  - Packaging:
      - Installers &amp; offline bundle: packaging.md
      - Releasing (signed installers): release.md
  - Architecture decisions: adr/README.md
  - Privacy policy: privacy.md

# The product spec (PRD.md) is large and section-numbered for the repo; it stays
# out of the rendered site. The MADR log under adr/ IS wired in: the index page
# (adr/README.md) is in the nav, and the individual records build and get their
# links validated, but are kept out of the nav tree via `not_in_nav` — so
# `mkdocs build --strict` stays green without ~50 nav leaves and without silencing
# genuine link warnings.
exclude_docs: |
  PRD.md

not_in_nav: |
  adr/0*.md

# Material's version selector reads mike's versions.json at deploy time; this is a
# theme setting only — the required docs-build job needs no `mike` install to pass
# `--strict`. Versioned publishing itself runs in .github/workflows/docs.yml.
extra:
  version:
    provider: mike

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
