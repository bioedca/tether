site_name: Tether
site_description: A cross-platform single-molecule FRET desktop suite (Mondragón Lab, Northwestern).
site_url: https://bioedca.github.io/tether/
repo_url: https://github.com/bioedca/tether
repo_name: bioedca/tether
copyright: Copyright &copy; 2026 The Tether Authors — GPL-3.0-or-later

theme:
  name: material
  features:
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Import:
      - Legacy Deep-LASI import: io/legacy-import.md
  - Analysis:
      - Seven-plot parity gallery: analysis/parity-gallery.md
  - Machine learning:
      - Deep trace classifier (GPU add-on): ml/deep-classifier.md
  - Packaging:
      - Installers &amp; offline bundle: packaging.md

# The product spec (PRD.md) and the MADR log (adr/) live under docs/ in the repo
# but are not yet wired into the rendered site — their cross-references are
# curated into the nav in a later docs PR. Excluding them from the build keeps
# `mkdocs build --strict` green without silencing genuine link warnings.
exclude_docs: |
  PRD.md
  adr/

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
