#
# Tether constructor recipe — 3-OS OFFLINE installer (ADR-0049, PRD §4.1, §9 M9).
#
# This is a `constructor` recipe (conda-incubator/constructor), NOT a plain YAML
# document: it uses conda-build line selectors (`# [win]`, `# [osx]`, `# [linux]`)
# and Jinja `{{ environ.get(...) }}` interpolation, so `constructor` must RENDER
# it before it is valid YAML. It is therefore EXCLUDED from the `check-yaml`
# pre-commit hook (.pre-commit-config.yaml) — validate it instead with
#   constructor --render packaging/     # offline: selector + Jinja + YAML parse
#   constructor --dry-run  packaging/    # full JSON-Schema key validation + solve
#
# The build driver (.github/workflows/packaging.yml and release.yml, and
# packaging/README.md for local builds) sets the env vars this recipe reads and
# stages the artifacts it references (the rendered per-platform locks under locks/,
# the THREE wheels — see `extra_files` below — and the GPL license text under
# staging/). See ADR-0049 for the architecture.
#
# UNSIGNED in this PR: the `*_signing_*` keys below are documented but left
# INACTIVE — constructor produces unsigned installers by default. Authenticode
# (Windows) + productsign/notarization (macOS) are wired with repository secrets in
# PR-2 (release.yml, §12.7). Do not uncomment them here.

name: Tether
version: {{ environ.get("TETHER_VERSION", "0.0.0") }}
company: The Tether Authors (Mondragón Lab, Northwestern)

# Build-time package source. constructor fetches everything HERE at build time and
# embeds it, so the produced installer resolves fully OFFLINE (no install-time
# git/network — §9 M9). Pin-and-hold is honoured because the two runtime stacks are
# sourced from the committed conda locks, rendered to per-platform EXPLICIT locks
# (no re-solve); conda-forge is only the build-time fetch origin.
channels:
  - conda-forge

# --- Base = thin installer-machinery env (python + conda) -------------------------
# `constructor` REQUIRES `conda` in the base environment whenever `extra_envs` is in
# use — the installer uses the base env's conda to create each extra env offline at
# INSTALL time (constructor fcp.py: "conda needs to be present in 'base' environment
# for 'extra_envs' to work"). So `base` here is deliberately a *minimal bootstrap*
# stack, NOT a Tether runtime stack: it is solved fresh from conda-forge at build
# time (installer plumbing, version-inert). The two PINNED runtime stacks — the
# PySide6/napari GUI and the isolated tMAVEN sidecar — are declared as `extra_envs`
# below, so both are consumed byte-for-byte from their committed explicit locks and
# pin-and-hold is fully preserved. This is the correction ADR-0049 records: making
# the GUI stack the constructor `base` is impossible without putting conda into the
# frozen GUI lock (a re-solve + runtime bloat we reject).
specs:
  - python
  - conda

# --- The two ISOLATED, PINNED runtime environments (constructor `extra_envs`) -----
# Each is installed into `<prefix>/envs/<name>` as a wholly separate interpreter and
# is built from its rendered per-platform EXPLICIT lock (`conda-lock render` from the
# committed unified lock), so the installer bundles the EXACT pinned packages
# (pin-and-hold; no fresh solve). `envs/tether` is the PySide6/current-numpy GUI +
# compute stack; `envs/sidecar` is PyQt5 + numpy<2 for one-click vbFRET / consensus
# VB-HMM / ebFRET. They never share a process — the "two conda-lock stacks stay
# isolated" invariant (PLAN §1.3, ADR-0004). `ignore_duplicate_files` is forced True
# whenever extra_envs is used (constructor).
extra_envs:
  tether:
    # menu_packages:[] disables the shortcuts napari would otherwise add. It stays
    # empty under ADR-0051 too: menuinst attaches shortcuts to a CONDA package, and
    # `tether` is an offline-pip-installed wheel, so it can own no menuinst entry.
    # The Tether shortcut is therefore created directly by post_install (ADR-0051).
    # Per-env menu_packages is NOT inherited from the global key, so set it here too.
    menu_packages: []
    environment_file: locks/base-linux-64.lock    # [linux]
    environment_file: locks/base-osx-64.lock       # [osx and not arm64]
    environment_file: locks/base-osx-arm64.lock    # [osx and arm64]
    environment_file: locks/base-win-64.lock       # [win]
  sidecar:
    environment_file: locks/sidecar-linux-64.lock    # [linux]
    environment_file: locks/sidecar-osx-64.lock       # [osx and not arm64]
    environment_file: locks/sidecar-osx-arm64.lock    # [osx and arm64]
    environment_file: locks/sidecar-win-64.lock       # [win]

# --- Non-packaged payloads bundled into the installer ---------------------------
# Three wheels, none of them conda packages. The first two are BUILT here: `tether`
# is a hatchling wheel and tMAVEN is a pip/git project (pinned commit 10f4230…,
# NOTICE / ADR-0049), both offline pip-installed by the post_install script below
# (`tether` into `envs/tether`, tMAVEN into `envs/sidecar`). Paths are relative to
# this construct.yaml directory; the build driver sets the env vars.
#
# The third wheel is DOWNLOADED: `setuptools<81`. tMAVEN's `maven_class.__init__`
# imports `pkg_resources`, which setuptools 81.0.0 deprecated and 82.0.0 removed,
# while sidecar/conda-lock.yml resolves 82.0.1 — so the sidecar env needs the older
# setuptools laid over it or the first idealization fails (issue #212). The `<81`
# bound is the one setuptools' own deprecation warning names. It is a pure-Python
# `py3-none-any` wheel, so the same file serves every platform.
extra_files:
  - {{ environ.get("TETHER_WHEEL", "staging/tether.whl") }}: wheelhouse/{{ environ.get("TETHER_WHEEL_NAME", "tether.whl") }}
  - {{ environ.get("TMAVEN_WHEEL", "staging/tmaven.whl") }}: wheelhouse/{{ environ.get("TMAVEN_WHEEL_NAME", "tmaven.whl") }}
  - {{ environ.get("SETUPTOOLS_WHEEL", "staging/setuptools.whl") }}: wheelhouse/{{ environ.get("SETUPTOOLS_WHEEL_NAME", "setuptools.whl") }}

# GPL-3.0 license text shown during install and shipped beside the installer
# (NOTICE: the bundled sidecar also ships tMAVEN's own GPL-3.0 text — staged by the
# build driver). Must be plain .txt for the shell (Linux) installer.
license_file: staging/LICENSE.txt

# Offline pip-install of the three wheels + wire the bundled sidecar interpreter.
# ONE key, per-OS by selector; constructor builds one installer per target OS.
post_install: scripts/post_install.sh    # [unix]
post_install: scripts/post_install.bat   # [win]

# Per-OS installer format. exe (NSIS) on Windows, pkg on macOS (productsign-signable
# in PR-2), sh on Linux.
installer_type: exe    # [win]
installer_type: pkg    # [osx]
installer_type: sh     # [linux]

# Behaviour: don't keep the package cache (smaller install), and do NOT touch the
# user's shell/registry — this is a GUI app launched from `envs/tether`, not a conda
# distribution, so the bootstrap conda in `base` must never initialise the user's
# shell. `initialize_conda: false` disables the conda-init step outright (the base
# now carries conda, which would otherwise offer it); `menu_packages: []` disables
# the shortcuts napari would add.
#
# These four keys are why nothing lands on PATH, which is what ADR-0051 addresses:
# post_install writes `<prefix>/bin/{tether,tether-gui}` shims plus a Start Menu
# shortcut (Windows) / .desktop entry (Linux). The installer still does NOT edit the
# user's PATH — `setx` truncates PATH past 1024 chars and rewriting a shell rc is
# equally invasive — so adding `<prefix>/bin` stays a documented one-line step.
keep_pkgs: false
initialize_conda: false
initialize_by_default: false    # [unix]
register_python: false          # [win]
menu_packages: []

# --- Code signing — DEFERRED to PR-2 (release.yml, §12.7); DO NOT enable here ----
# Constructor leaves installers UNSIGNED unless these are set with real credentials,
# which live as repository secrets wired in the release pipeline:
#   windows_signing_tool: signtool            # [win]  (or azuresigntool)
#   signing_identity_name: "Developer ID Installer: ..."   # [osx]  productsign
#   notarization_identity_name: "Developer ID Application: ..."   # [osx]
