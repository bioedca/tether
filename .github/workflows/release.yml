# SPDX-FileCopyrightText: 2026 The Tether Authors <bioedca@u.northwestern.edu>
# SPDX-License-Identifier: GPL-3.0-or-later
#
# release — the M9 release pipeline (PRD §9 M9, §12.7; ADR-0050). Driven by a signed,
# annotated `v*` tag on main (or a manual dry-run): verify the tag → build the 3-OS
# constructor installers (the PR-1 recipe) → CODE-SIGN them → checksum + SBOM →
# build-provenance attestation → GitHub Release with the installers, checksums, SBOM
# and the frozen conda locks, plus an auto changelog from Conventional Commits.
#
# SIGNING IS GATED, NOT HARDCODED (ADR-0050):
#   * Windows — SignPath (free for OSS). The signing step runs only when the SignPath
#     repository VARIABLES are set (vars.SIGNPATH_* — non-secret, usable in `if:`),
#     with the API token as a secret. Until the project is enrolled at signpath.io
#     and the vars/secret are added, the Windows installer ships UNSIGNED.
#   * macOS — Developer ID codesign + notarytool, gated on `vars.APPLE_SIGNING_ENABLED
#     == 'true'`. Until an Apple Developer account + certs/creds exist as secrets, the
#     macOS installer ships UNSIGNED (Gatekeeper warns).
#   * Linux — no OS-level signing; the SHA-256 checksums (and provenance attestation)
#     are the integrity anchor.
# See docs/release.md for the exact variables/secrets and the SignPath enrollment steps.
#
# `cancel-in-progress: false` — a release must never be cancelled mid-flight.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag (or ref) to build from for a dry-run, e.g. v1.0.0-rc1."
        type: string
        required: true
      dry_run:
        description: "Build + sign + validate but do NOT publish a GitHub Release."
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1) Verify the release tag: annotated + GitHub-verified signature + on main.
  # ---------------------------------------------------------------------------
  verify:
    name: verify tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve target tag + publish mode
        id: resolve
        # Untrusted inputs routed through env, never inlined into the script.
        env:
          EVENT: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "push" ]; then
            tag="$PUSH_TAG"; publish="true"
          else
            tag="$INPUT_REF"
            if [ "$INPUT_DRY_RUN" = "false" ]; then publish="true"; else publish="false"; fi
          fi
          test -n "$tag" || { echo "::error::no tag/ref resolved"; false; }
          case "$tag" in v*) : ;; *) echo "::error::tag '$tag' must start with 'v'"; false ;; esac
          {
            echo "tag=$tag"
            echo "version=${tag#v}"
            echo "publish=$publish"
          } >> "$GITHUB_OUTPUT"
          echo "Release tag '$tag' (publish=$publish)."

      - name: Require an annotated, GitHub-verified signature on a real release
        if: steps.resolve.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          # Annotated (not lightweight) tag object.
          test "$(git cat-file -t "refs/tags/$TAG")" = "tag" \
            || { echo "::error::$TAG is not an annotated tag"; false; }
          # Trust GitHub's own signature verification (it holds bioedca's registered
          # signing key) rather than shipping an allowed-signers file to the runner.
          tag_sha="$(git rev-parse "refs/tags/$TAG")"
          verified="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" -q '.verification.verified')"
          test "$verified" = "true" \
            || { echo "::error::tag $TAG has no GitHub-verified signature"; false; }
          # The tagged commit must live on main (releasable-from-main invariant).
          # Full main history (not --depth=1) so `--is-ancestor` can resolve a tag
          # placed a few commits behind the current main tip.
          commit="$(git rev-list -n1 "refs/tags/$TAG")"
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$commit" refs/remotes/origin/main \
            || { echo "::error::tag commit $commit is not on origin/main"; false; }
          echo "Verified annotated + signed tag $TAG on main."

  # ---------------------------------------------------------------------------
  # 2) Build + sign the 3-OS installers (the PR-1 constructor recipe + signing).
  # ---------------------------------------------------------------------------
  build:
    name: build+sign / ${{ matrix.platform }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux-64 }
          - { os: macos-latest, platform: osx-arm64 }
          # macos-15-intel is the x86_64 (Intel) hosted runner — macos-13 was
          # retired 2025-12-08; this exercises the osx-64 build the recipe bundles.
          - { os: macos-15-intel, platform: osx-64 }
          - { os: windows-latest, platform: win-64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    defaults:
      run:
        shell: bash -el {0}
    env:
      TMAVEN_SPEC: "git+https://github.com/GonzalezBiophysicsLab/tmaven.git@10f4230b6d13c6d2ad67b05d801696b4a40eff4a"
      PLATFORM: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Provision the build env (constructor + conda-lock + build tools)
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          # Pin the micromamba binary (pin-and-hold, PRD §4.1). Tag form from
          # mamba-org/micromamba-releases; the `-0` build suffix is REQUIRED. Held equal
          # to .github/actions/setup-env/action.yml and packaging.yml (contract-tested)
          # so the pin is one knob; see setup-env for the #306/#307 rationale.
          #
          # SCOPE: this pins the SOLVER for the pkgbuild tool env only. It does NOT make
          # the release toolchain reproducible — create-args below re-solves
          # constructor/conda-standalone/python-build/pip/wheel from conda-forge on every
          # run, and micromamba never restores a Tether lock on this path (the locks go
          # through `conda-lock render` into constructor/conda-standalone).
          micromamba-version: "2.8.1-0"
          environment-name: pkgbuild
          # See packaging.yml for the create-args rationale (no quoted match specs;
          # explicit pip; setuptools<81 for tMAVEN's pkg_resources).
          create-args: >-
            python=3.12
            constructor>=3.16
            conda-lock=4.0.1
            conda-standalone
            python-build
            pip
            setuptools<81
            wheel
          init-shell: bash
          cache-environment: true

      - name: Build the tether wheel (hatch-vcs version from git)
        run: python -m build --wheel --outdir packaging/staging .

      - name: Build the pinned trimmed tMAVEN wheel (offline sidecar payload)
        run: python -m pip wheel --no-deps --no-build-isolation -w packaging/staging "${TMAVEN_SPEC}"

      - name: Stage the setuptools<81 wheel (restores pkg_resources in the sidecar)
        # tMAVEN's `maven_class.__init__` does `import pkg_resources`, which setuptools
        # 81.0.0 DEPRECATED (still shipped) and 82.0.0 REMOVED, while sidecar/conda-lock.yml
        # resolves 82.0.1 on every platform — so the installed sidecar needs the pin laid
        # over it or the first idealization fails (issue #212). `<81` rather than `<82` is
        # the bound setuptools' own deprecation warning names. Mirrors packaging.yml:
        # `extra_files` in construct.yaml is unconditional, so without this step
        # constructor aborts with FileNotFoundError. setuptools publishes a pure-Python
        # `py3-none-any` wheel, so ONE file serves all four platforms. Block scalar, not
        # an inline value: the trailing colon of `--only-binary=:all:` plus the following
        # space form a YAML `key: value` separator mid-line and the parser rejects the
        # step outright (`ScannerError`).
        run: |
          python -m pip download --only-binary=:all: --no-deps \
            -d packaging/staging "setuptools<81"

      - name: Render per-platform EXPLICIT locks (pin-and-hold; no re-solve)
        run: |
          mkdir -p packaging/locks
          cd packaging/locks
          conda-lock render -k explicit -p "$PLATFORM" ../../conda-lock.yml
          mv "conda-$PLATFORM.lock" "base-$PLATFORM.lock"
          conda-lock render -k explicit -p "$PLATFORM" ../../sidecar/conda-lock.yml
          mv "conda-$PLATFORM.lock" "sidecar-$PLATFORM.lock"

      - name: Stage the GPL license text + resolve wheel names
        run: |
          cp LICENSE packaging/staging/LICENSE.txt
          tether_whl="$(ls packaging/staging/tether-*.whl | head -1)"
          tmaven_whl="$(ls packaging/staging/tmaven-*.whl | head -1)"
          setuptools_whl="$(ls packaging/staging/setuptools-*.whl | head -1)"
          {
            # construct.yaml reads `version: {{ environ.get("TETHER_VERSION", "0.0.0") }}`;
            # without this the installer would be built + named 0.0.0 for a real tag.
            echo "TETHER_VERSION=$(python -c 'import tether._version as v; print(v.__version__)' 2>/dev/null || git describe --tags --always | sed 's/^v//')"
            echo "TETHER_WHEEL=staging/$(basename "$tether_whl")"
            echo "TETHER_WHEEL_NAME=$(basename "$tether_whl")"
            echo "TMAVEN_WHEEL=staging/$(basename "$tmaven_whl")"
            echo "TMAVEN_WHEEL_NAME=$(basename "$tmaven_whl")"
            echo "SETUPTOOLS_WHEEL=staging/$(basename "$setuptools_whl")"
            echo "SETUPTOOLS_WHEEL_NAME=$(basename "$setuptools_whl")"
          } >> "$GITHUB_ENV"

      - name: Validate the recipe (offline render + schema)
        run: constructor --render packaging/

      - name: Build the installer
        run: constructor --output-dir packaging/dist packaging/

      # --- Windows code-signing via SignPath (free for OSS) -------------------
      # Gated on the SignPath repo VARIABLES (non-secret → usable in `if:`); the API
      # token is a secret. When unset, the .exe ships unsigned (see docs/release.md).
      - name: Upload the unsigned Windows installer (for SignPath)
        id: unsigned_exe
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tether-installer-win-64-unsigned
          path: packaging/dist/*.exe
          if-no-files-found: error

      - name: Sign the Windows installer (SignPath)
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.unsigned_exe.outputs.artifact-id }}
          wait-for-completion: true
          # Overwrite the unsigned .exe in place with the signed one.
          output-artifact-directory: packaging/dist

      - name: Note when Windows signing is skipped (no SignPath config)
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID == ''
        run: echo "::warning::SignPath not configured (vars.SIGNPATH_ORGANIZATION_ID unset) — the Windows installer ships UNSIGNED. See docs/release.md."

      # --- macOS code-signing + notarization (gated; unsigned until enrolled) --
      # PREREQUISITE before flipping vars.APPLE_SIGNING_ENABLED on: notarization
      # (notarytool + stapler) additionally requires every Mach-O binary in the
      # bundled conda payload to be Developer-ID-Application-signed with a hardened
      # runtime. This step signs only the outer .pkg (productsign); the payload
      # deep-sign is a documented follow-up (docs/release.md) — until it exists,
      # enabling the gate would fail notarization. macOS therefore ships UNSIGNED.
      - name: Sign + notarize the macOS installer (Developer ID)
        if: runner.os == 'macOS' && vars.APPLE_SIGNING_ENABLED == 'true'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          pkg="$(ls packaging/dist/*.pkg | head -1)"
          # Import the Developer ID cert into a temporary keychain.
          kc="$RUNNER_TEMP/tether-signing.keychain-db"
          kc_pass="$(openssl rand -base64 24)"
          security create-keychain -p "$kc_pass" "$kc"
          security set-keychain-settings -lut 21600 "$kc"
          security unlock-keychain -p "$kc_pass" "$kc"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$kc" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/productsign -T /usr/bin/codesign
          security list-keychains -d user -s "$kc"
          security set-key-partition-list -S apple-tool:,apple: -k "$kc_pass" "$kc" >/dev/null
          # Sign the product installer.
          signed="$RUNNER_TEMP/$(basename "$pkg" .pkg)-signed.pkg"
          productsign --sign "$APPLE_SIGNING_IDENTITY" "$pkg" "$signed"
          mv "$signed" "$pkg"
          # Notarize with an App Store Connect API key, then staple the ticket.
          echo "$APPLE_NOTARY_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          xcrun notarytool submit "$pkg" \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$pkg"
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/notary.p8"
          echo "Signed + notarized $pkg."

      - name: Note when macOS signing is skipped
        if: runner.os == 'macOS' && vars.APPLE_SIGNING_ENABLED != 'true'
        run: echo "::warning::Apple signing disabled (vars.APPLE_SIGNING_ENABLED != 'true') — the macOS installer ships UNSIGNED. See docs/release.md."

      # --- Checksums + per-platform artifact bundle ---------------------------
      - name: SHA-256 checksums for the installer(s)
        run: |
          set -euo pipefail
          cd packaging/dist
          shopt -s nullglob
          files=(*.exe *.pkg *.sh)
          test "${#files[@]}" -gt 0 || { echo "::error::no installer artifact found in packaging/dist"; false; }
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${files[@]}" > "SHA256SUMS-${PLATFORM}.txt"
          else
            shasum -a 256 "${files[@]}" > "SHA256SUMS-${PLATFORM}.txt"
          fi
          cat "SHA256SUMS-${PLATFORM}.txt"

      - name: Upload the platform release bundle (installer + checksums + locks)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.platform }}
          path: |
            packaging/dist/*.exe
            packaging/dist/*.pkg
            packaging/dist/*.sh
            packaging/dist/SHA256SUMS-*.txt
            packaging/locks/base-${{ matrix.platform }}.lock
            packaging/locks/sidecar-${{ matrix.platform }}.lock
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3) Aggregate → SBOM + provenance → GitHub Release (real publish only).
  # ---------------------------------------------------------------------------
  release:
    name: publish release
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # build-provenance attestation
      attestations: write # build-provenance attestation
      actions: write # dispatch docs.yml (see "Publish the documentation site")
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download all platform release bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Stage the release assets (installers + checksums + frozen locks)
        id: assets
        # Explicit `bash` (not the runner default) because this script relies on
        # bash arrays, `read -ra`, a here-string and `shopt`. Deliberately NOT
        # `bash -el {0}`: the login shell is the one that turns an explicit `exit`
        # into "Process completed with exit code 1" (see the build job). The gate
        # below therefore terminates with a falsy command, never `exit`.
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          # One entry per leg of the `build` matrix above (jobs.build.strategy.matrix.include),
          # as "<platform>:<installer extension>". This line is the single source of truth for
          # what a COMPLETE release looks like, and BOTH halves are contract-tested in
          # tests/test_marker_contract.py: the PLATFORMS against the build matrix in this file,
          # and the EXTENSIONS against `installer_type:` in packaging/construct.yaml. Changing
          # the matrix or the recipe therefore fails the required 3-OS test matrix and forces a
          # deliberate edit here, instead of leaving a silently-wrong expectation behind.
          EXPECTED_LEGS="linux-64:sh osx-arm64:pkg osx-64:pkg win-64:exe"

          mkdir -p out

          # Log the downloaded layout FIRST — it is the thing that silently drifts.
          # upload-artifact roots each bundle at the least-common-ancestor of its SPECIFIED
          # upload paths (the declared globs, not the matched files — so the root is
          # `packaging/` identically on all four legs, including Windows where *.pkg/*.sh
          # match nothing). A bundle therefore unpacks to dist/dist/<installer> and
          # dist/locks/<lock>: depth 2, exactly the `-maxdepth 2` below with ZERO headroom.
          # Add a seventh upload path outside packaging/ and every bundle gains a level, the
          # find matches nothing, and — without the gate below — this job stays GREEN.
          echo "::group::downloaded artifact tree (dist/)"
          find dist -type f | sort || echo "(no dist/ — download-artifact staged nothing)"
          echo "::endgroup::"

          # Installers + per-platform checksums from the build bundles.
          find dist -maxdepth 2 -type f \
            \( -name '*.exe' -o -name '*.pkg' -o -name '*.sh' -o -name 'SHA256SUMS-*.txt' \) \
            -exec cp {} out/ \;
          # The authoritative bill-of-materials: the frozen SOURCE locks. Note the per-platform
          # RENDERED locks the build uploads (packaging/locks/{base,sidecar}-<platform>.lock)
          # land under dist/locks/ and are deliberately NOT staged — docs/release.md ships "the
          # frozen conda locks", which these two satisfy. If that ever changes, add '*.lock' to
          # the find name-filter above AND assert 2x<leg count> of them below.
          cp conda-lock.yml "out/conda-lock.yml"
          cp sidecar/conda-lock.yml "out/sidecar-conda-lock.yml"
          ls -l out

          # --- Completeness gate (unconditional — it MUST also run in a dry run) --------
          # `find ... -exec cp` exits 0 when it matches NOTHING, even under `set -euo pipefail`.
          # The two steps that would otherwise notice — attest-build-provenance over
          # out/*.exe|*.pkg|*.sh, and `gh release create` — are BOTH gated on publish == 'true'.
          # So a dry run would stage two lock files, skip the gated steps and report GREEN: the
          # rehearsal could not detect its own worst failure. Assert the whole expected set here
          # instead, on every run. (Even on a real publish, attest only requires >=1 match per
          # pattern, so "1 .pkg where 2 were required" is caught ONLY here.)
          problems=()
          # Parse with `read -ra`, NOT unquoted word splitting: `shopt -s nullglob` is on, so an
          # unquoted $EXPECTED_LEGS word containing a glob metacharacter would VANISH rather than
          # stay literal — silently shrinking the expected set and making this gate fail OPEN.
          # `read -ra` splits on IFS with no pathname expansion, so a malformed leg fails LOUDLY.
          read -ra legs <<<"$EXPECTED_LEGS"
          want_exe=0
          want_pkg=0
          want_sh=0
          for leg in "${legs[@]}"; do
            platform="${leg%%:*}"
            ext="${leg##*:}"
            # One checksum file per leg, named by platform — the per-leg arrival receipt, and the
            # only per-PLATFORM evidence available (installer filenames use constructor's own
            # naming, e.g. Tether-1.0.0-MacOSX-arm64.pkg, which does not map back to `osx-arm64`).
            if [ ! -s "out/SHA256SUMS-${platform}.txt" ]; then
              problems+=("missing/empty SHA256SUMS-${platform}.txt — leg '${platform}' contributed nothing")
            fi
            case "$ext" in
              exe) want_exe=$((want_exe + 1)) ;;
              pkg) want_pkg=$((want_pkg + 1)) ;;
              sh) want_sh=$((want_sh + 1)) ;;
              *) problems+=("EXPECTED_LEGS entry '${leg}' has an unknown installer extension") ;;
            esac
          done
          # An unrecognised extension would otherwise increment nothing and quietly lower the
          # expected totals. Bind the sum of the per-extension wants back to the declared legs.
          if [ "$((want_exe + want_pkg + want_sh))" -ne "${#legs[@]}" ]; then
            problems+=("EXPECTED_LEGS declares ${#legs[@]} leg(s) but only $((want_exe + want_pkg + want_sh)) resolved to a known extension")
          fi

          got_exe=(out/*.exe)
          got_pkg=(out/*.pkg)
          got_sh=(out/*.sh)
          # Per-extension, not just a total of 4. The two macOS legs are distinguished ONLY by
          # the arch constructor embeds in the .pkg name, and `merge-multiple: true` silently
          # overwrites same-named files — so a stage of 2 .exe + 1 .pkg + 1 .sh still TOTALS 4
          # while the Intel-Mac installer is missing. Per-extension sees "expected 2 .pkg,
          # staged 1". Exact equality (not `-ge`) also catches OVER-collection.
          [ "${#got_exe[@]}" -eq "$want_exe" ] || problems+=("expected ${want_exe} .exe installer(s), staged ${#got_exe[@]}")
          [ "${#got_pkg[@]}" -eq "$want_pkg" ] || problems+=("expected ${want_pkg} .pkg installer(s), staged ${#got_pkg[@]}")
          [ "${#got_sh[@]}" -eq "$want_sh" ] || problems+=("expected ${want_sh} .sh installer(s), staged ${#got_sh[@]}")
          # `cp` above already fails hard under `set -e` if a lock is absent, so only emptiness
          # is left: a zero-byte lock would publish an unusable bill-of-materials.
          [ -s out/conda-lock.yml ] || problems+=("out/conda-lock.yml staged empty")
          [ -s out/sidecar-conda-lock.yml ] || problems+=("out/sidecar-conda-lock.yml staged empty")

          if [ "${#problems[@]}" -eq 0 ]; then
            echo "Staged a complete release — every expected leg present (${EXPECTED_LEGS})."
          else
            for p in "${problems[@]}"; do echo "::error::release staging: ${p}"; done
            echo "Expected legs: ${EXPECTED_LEGS}"
            echo "--- staged in out/ ---"
            ls -la out
            echo "--- downloaded under dist/ (layout drift shows up here) ---"
            find dist -type f | sort || true
            echo "::error::Refusing to stage a partial release (${#problems[@]} problem(s) above)."
            # Terminate falsy, never `exit` (repo hard rule): this is the last command the
            # script runs, so the step fails via `set -e` AND via the final exit status.
            false
          fi

      - name: Generate a CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: out/tether-sbom.cyclonedx.json
          artifact-name: tether-sbom.cyclonedx.json

      - name: Generate the changelog (Conventional Commits since the previous tag)
        env:
          TAG: ${{ needs.verify.outputs.tag }}
        run: |
          set -euo pipefail
          prev="$(git describe --tags --abbrev=0 --exclude="$TAG" "${TAG}^" 2>/dev/null || true)"
          if [ -n "$prev" ]; then range="${prev}..${TAG}"; header="## ${TAG} (changes since ${prev})"; else range="$TAG"; header="## ${TAG}"; fi
          {
            echo "$header"
            echo
            for grp in "feat:Features" "fix:Bug fixes" "perf:Performance" "docs:Documentation" "refactor:Refactoring" "build:Build & packaging" "ci:CI"; do
              type="${grp%%:*}"; title="${grp#*:}"
              body="$(git log --no-merges --pretty='- %s (%h)' "$range" 2>/dev/null | grep -E "^- ${type}(\(|!?:)" || true)"
              if [ -n "$body" ]; then printf '### %s\n%s\n\n' "$title" "$body"; fi
            done
          } > out/CHANGELOG-${TAG}.md
          cp "out/CHANGELOG-${TAG}.md" "$RUNNER_TEMP/notes.md"
          echo "notes=$RUNNER_TEMP/notes.md" >> "$GITHUB_OUTPUT"
        id: changelog

      - name: Combined SHA-256 manifest over every release asset
        # After the installers, locks, SBOM and changelog are all staged, so the
        # manifest covers the whole Release (the `*` glob expands before the `>`
        # redirect creates SHA256SUMS.txt, so it never lists itself).
        run: cd out && sha256sum -- * > SHA256SUMS.txt

      - name: Attest build provenance for the release assets
        if: needs.verify.outputs.publish == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            out/*.exe
            out/*.pkg
            out/*.sh

      - name: Create the GitHub Release
        if: needs.verify.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          set -euo pipefail
          flags=(--title "$TAG" --notes-file "$NOTES" --verify-tag)
          # A hyphenated tag (v1.0.0-rc1) is a pre-release.
          case "$TAG" in *-*) flags+=(--prerelease) ;; esac
          gh release create "$TAG" out/* "${flags[@]}"
          echo "Published GitHub Release $TAG."

      - name: Publish the documentation site (dispatch docs.yml)
        # docs.yml triggers on `release: [published]`, but the step above creates that
        # Release with the default GITHUB_TOKEN — and by design, events raised by that
        # token do NOT start new workflow runs. Left alone, docs.yml would never fire and
        # the site would stay frozen on the hand-dispatched `dev` tree while 1.0 ships.
        # Dispatching it explicitly here is what closes that gap (it is also why this job
        # carries `actions: write`).
        #
        # STABLE TAGS ONLY. docs.yml's own pre-release guard
        # (`github.event.release.prerelease == false`) does not apply to a
        # workflow_dispatch, so the skip has to be re-implemented on THIS side: a
        # pre-release like v1.0.0-rc1 collapses to the same `1.0` doc label as the stable
        # tag and would repoint `latest` and the site default at release-candidate docs.
        #
        # `--ref "$TAG"` matters: without it `gh workflow run` dispatches against the
        # remote's DEFAULT BRANCH, and docs.yml's checkout would then build whatever main
        # holds at that moment. `verify` only requires the tagged commit to be an ancestor
        # of main, so a tag cut a few commits back — or main advancing during the ~15 min
        # build matrix — would publish unreleased docs under the released version. Pinning
        # the dispatch to the tag makes the published docs match the shipped artifacts.
        if: needs.verify.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
        run: |
          set -euo pipefail
          case "$TAG" in
            *-*)
              echo "::notice::$TAG is a pre-release — not publishing the documentation site."
              echo "Pre-release $TAG: documentation publish skipped." >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              gh workflow run docs.yml --ref "$TAG" -f version="$TAG"
              echo "Dispatched docs.yml to publish the documentation for $TAG."
              echo "Dispatched docs.yml to publish the documentation for $TAG." >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac

      - name: Dry-run summary (no Release published)
        if: needs.verify.outputs.publish != 'true'
        run: |
          echo "Dry-run for ${{ needs.verify.outputs.tag }} — built, signed (where configured), checksummed and SBOM'd; no Release published." >> "$GITHUB_STEP_SUMMARY"
          ls -l out >> "$GITHUB_STEP_SUMMARY"
