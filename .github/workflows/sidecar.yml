#
# sidecar / parity — the M0.5 idealization-parity gate (PRD §7.4, §9 M0.5, §12.6).
# It provisions the ISOLATED tMAVEN sidecar env (sidecar/conda-lock.yml — numpy<2 /
# PyQt5, never the base stack), installs the pinned tMAVEN, and runs the live
# `@pytest.mark.sidecar` suite: drive `tmaven.maven.maven_class` headless → fit the
# committed SMD fixtures → assert each fresh fit agrees WITHIN the frozen tolerance
# (schema/parity_tolerance.json): consensus VB-HMM (vbconhmm) vs the 281-mol
# reference + a 4-mol cross-seed anchor, and ebFRET (ebhmm) cross-seed vs its own
# per-method tolerance (ADR-0043). The tolerance is a frozen INPUT ratified out of
# band; this job asserts against it and never recomputes it.
#
# The parity gate is layered:
#   * PR-facing, pure (always required): the base `test` matrix runs
#     `tests/test_parity.py`, which asserts the FROZEN JSON against its own recorded
#     evidence (top-level + per-method) — no sidecar, gates every PR, catches a
#     tampered/loosened tolerance.
#   * Live (this workflow): drives the real fits vs the frozen tolerance, which needs
#     the heavy sidecar env + tMAVEN.
#
# Trigger: `pull_request` (path-gated, below) + manual `workflow_dispatch` + nightly
# `schedule`. On a PR the job ALWAYS runs but only does the heavy env+fit when the PR
# touches idealization-relevant paths (src/tether/idealize, sidecar, the tolerance,
# the sidecar tests, this workflow, or the setup-env action); an unrelated PR reports
# a fast "not applicable" success in seconds. Because the single `sidecar / parity`
# job always completes and reports, it is safe to add to the `main-baseline` ruleset's
# required set (per §12.6 "Active from M0.5") WITHOUT leaving unrelated PRs stuck on a
# never-reported check — the classic required-plus-path-filter footgun. dispatch /
# nightly always run the full suite (belt-and-suspenders drift detection for `main`).
name: sidecar

on:
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly at 06:37 UTC (off the hour to avoid the cron stampede).
    - cron: "37 6 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: sidecar / parity
    runs-on: ubuntu-latest
    # The Windows-Defender JIT-scan stall that blocked M0.5 S1 is host-specific;
    # Linux runners are unaffected, but bound the job so a hung fit fails fast.
    timeout-minutes: 30
    defaults:
      run:
        # Activate the restored micromamba sidecar env (init-shell: bash). Steps
        # before setup-env just get a plain login bash (no env yet), which is all the
        # relevance/LFS steps need.
        shell: bash -el {0}
    env:
      QT_QPA_PLATFORM: offscreen
      NAPARI_ASYNC: "0"
      # NUMBA_CACHE_DIR is set at the STEP level (below), not here: the `runner`
      # context is NOT available in a job-level `env:` block (it resolves only
      # once a runner is assigned), so `${{ runner.temp }}` here fails workflow
      # validation ("Unrecognized named-value: 'runner'") and the run reports a
      # startup_failure with zero jobs created on every push/PR.
      # The pinned tMAVEN reference (overridable for a fork/SHA bump). tMAVEN is
      # NOT a conda-lock dep (it is the GPL reference app driven over IPC), so it
      # is installed into the sidecar env here.
      TMAVEN_SPEC: "git+https://github.com/GonzalezBiophysicsLab/tmaven.git@10f4230"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so the relevance step can diff the PR against its base. LFS
          # is fetched on demand (below) only when the heavy fit will actually run,
          # so an unrelated PR never downloads the large-tier fixtures.
          fetch-depth: 0
          lfs: false
      - name: Decide whether the live fit applies to this event
        id: relevance
        # A dispatch or nightly always runs the full suite. On a PR, run it only when
        # the diff touches something that can change a live idealization result; an
        # unrelated PR passes this required check in seconds without provisioning the
        # heavy env. `grep` in an `if` is exempt from `-e`, so a no-match is safe. The
        # inputs are bound to env vars (not inlined via ${{ }}) — they are not
        # attacker-controllable, but this keeps the script off the template-injection
        # path and clean under zizmor.
        #
        # The step resolves run=true/false into a variable and writes GITHUB_OUTPUT
        # exactly ONCE at the end — it never calls an explicit `exit`. Under the
        # runner's `bash -el {0}` login shell an explicit `exit 0` here reports
        # "Process completed with exit code 1": every nightly `schedule` and manual
        # `workflow_dispatch` run (which took the non-PR `exit 0` branch) failed at
        # this gate, while the fall-through PR branch always passed. Both branches now
        # fall through to the same terminal append, so the step's status is that
        # append's (0). test_marker_contract.py guards against reintroducing `exit`.
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          run=false
          if [ "$EVENT_NAME" != "pull_request" ]; then
            run=true
            echo "event=$EVENT_NAME -> running the full live suite."
          else
            changed="$(git diff --name-only "$BASE_SHA" HEAD)"
            echo "changed files:"; echo "$changed"
            # Gate on the SAME file set the pytest step collects (tests/test_*sidecar*.py,
            # e.g. both test_parity_sidecar.py and test_sidecar_driver.py), so a change to
            # ANY sidecar module runs the live suite — not just the parity module.
            pattern='^(src/tether/idealize/|sidecar/|scripts/setup_sidecar\.py|schema/parity_tolerance\.json|tests/test_.*sidecar.*\.py|\.github/workflows/sidecar\.yml|\.github/actions/setup-env/)'
            if echo "$changed" | grep -qE "$pattern"; then
              run=true
              echo "Idealization-relevant paths changed -> running the live parity suite."
            else
              echo "No idealization-relevant paths changed -> sidecar parity not applicable (pass)."
            fi
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
      - name: Fetch the LFS large-tier fixtures (281-mol reference + SMD)
        if: steps.relevance.outputs.run == 'true'
        run: git lfs pull
      - name: Restore the sidecar env + install tether (no deps)
        if: steps.relevance.outputs.run == 'true'
        uses: ./.github/actions/setup-env
        with:
          environment-file: sidecar/conda-lock.yml
          environment-name: tether-sidecar
          install-tether: "true"
      - name: Install pinned tMAVEN + pytest via the guided sidecar-setup script
        if: steps.relevance.outputs.run == 'true'
        # The guided sidecar-setup script (`scripts/setup_sidecar.py`, issue #13) owns the
        # two steps that live OUTSIDE `sidecar/conda-lock.yml`: the pip-layered tMAVEN (the
        # GPL reference app driven over IPC, layered onto the lock, not in it) and the
        # `setuptools<81` pin that restores the legacy `pkg_resources` API tMAVEN imports at
        # runtime (setuptools removed it in 82.0.0; the lock resolves 82.0.1). Running it
        # HERE means the SAME script a user (and the 2-OS hand-off check) runs is exercised
        # on this Linux runner, so "the setup script runs clean" is continuously tested — the
        # CI leg of issue #13's two-OS requirement. The micromamba step above already
        # restored the env, so `--python` targets it (env creation skipped); `TMAVEN_SPEC` is
        # read from the job env by the script; the trailing `--probe` (default) imports +
        # instantiates `maven_class` as a liveness check before the parity fit.
        env:
          # A writable Numba cache so the probe's cold tMAVEN import does not fail on a
          # read-only default location (the parity step sets the same at its level).
          NUMBA_CACHE_DIR: ${{ runner.temp }}/numba-cache
        run: |
          python scripts/setup_sidecar.py \
            --python "$(python -c 'import sys; print(sys.executable)')" --with-pytest
      - name: Assert idealization parity against the frozen tolerance
        if: steps.relevance.outputs.run == 'true'
        env:
          # runner.temp is valid here (step level) but not in the job-level env.
          NUMBA_CACHE_DIR: ${{ runner.temp }}/numba-cache
          # run_vbfret spawns the sidecar interpreter; here it is this same env.
          TETHER_SIDECAR_PYTHON_AUTO: "1"
        run: |
          export TETHER_SIDECAR_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          # Scope collection to the sidecar test modules only. The isolated sidecar
          # env intentionally lacks the base GUI/IO stack (tifffile, napari, …), so a
          # repo-wide `pytest -m sidecar` aborts at COLLECTION the moment it imports
          # an unrelated base-only module (e.g. tests/test_movie_panel.py → tifffile)
          # → exit 2 before any sidecar test runs. The real sidecar modules import
          # only `tether.idealize`, which the sidecar env satisfies. The
          # `test_*sidecar*.py` glob is the contract enforced in the base matrix by
          # tests/test_marker_contract.py, so a new sidecar test cannot silently
          # escape this job. `-m sidecar` still filters within the collected files.
          pytest -m sidecar tests/test_*sidecar*.py -q
