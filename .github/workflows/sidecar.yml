#
# sidecar / parity — the M0.5 idealization-parity gate (PRD §7.4, §9 M0.5, §12.6).
# It provisions the ISOLATED tMAVEN sidecar env (sidecar/conda-lock.yml — numpy<2 /
# PyQt5, never the base stack), installs the pinned tMAVEN, and runs the live
# `@pytest.mark.sidecar` suite: drive `tmaven.maven.maven_class` headless → fit the
# committed SMD fixtures → assert each fresh fit agrees with the committed reference
# (281-mol reference model; a cross-seed anchor for the 4-mol) WITHIN the frozen
# §11.2 tolerance (schema/parity_tolerance.json). The tolerance is a frozen INPUT
# ratified once at M0.5; this job asserts against it and never recomputes it.
#
# The parity gate is split in two (the separation CodeRabbit flagged on PR #21):
#   * PR-facing, pure: the base `test` matrix runs `tests/test_parity.py`, which
#     asserts the FROZEN JSON against its own recorded evidence
#     (`test_frozen_artifact_covers_its_own_measured_evidence`) — no sidecar, so it
#     gates every PR and catches a tampered/loosened tolerance.
#   * Out-of-band, live (this workflow): drive the real fits and assert them vs the
#     frozen tolerance, which needs the heavy sidecar env + tMAVEN.
#
# Trigger: manual (workflow_dispatch) + nightly (schedule), NOT pull_request — the
# sidecar env is heavy to provision and the live fits are slow, so it is run out of
# band rather than on every PR. It is intentionally NOT yet a required status check:
# promotion into the `main-baseline` ruleset's required set (mirroring how S4/S6
# promoted schema-guard, per §12.6 "Active from M0.5" / §12.10) is gated on a first
# confirmed-green dispatch run that proves tMAVEN installs cleanly on the runner
# (the env's `tmaven` is the pinned reference repo, not a conda-lock dep). Until
# then it stays a non-blocking nightly/dispatch job so a provisioning hiccup can
# never red-gate `main`.
name: sidecar

on:
  workflow_dispatch:
  schedule:
    # Nightly at 06:37 UTC (off the hour to avoid the cron stampede).
    - cron: "37 6 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: sidecar / parity
    runs-on: ubuntu-latest
    # The Windows-Defender JIT-scan stall that blocked M0.5 S1 is host-specific;
    # Linux runners are unaffected, but bound the job so a hung fit fails fast.
    timeout-minutes: 30
    defaults:
      run:
        # Activate the restored micromamba sidecar env (init-shell: bash).
        shell: bash -el {0}
    env:
      QT_QPA_PLATFORM: offscreen
      NAPARI_ASYNC: "0"
      NUMBA_CACHE_DIR: ${{ runner.temp }}/numba-cache
      # The pinned tMAVEN reference (overridable for a fork/SHA bump). tMAVEN is
      # NOT a conda-lock dep (it is the GPL reference app driven over IPC), so it
      # is installed into the sidecar env here.
      TMAVEN_SPEC: "git+https://github.com/GonzalezBiophysicsLab/tmaven.git@10f4230"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # The 281-mol reference model + SMD live in the LFS large-fixture tier.
          lfs: true
      - name: Restore the sidecar env + install tether (no deps)
        uses: ./.github/actions/setup-env
        with:
          environment-file: sidecar/conda-lock.yml
          environment-name: tether-sidecar
          install-tether: "true"
      - name: Install pinned tMAVEN + pytest into the sidecar env
        run: python -m pip install --no-build-isolation pytest "${TMAVEN_SPEC}"
      - name: Assert idealization parity against the frozen §11.2 tolerance
        env:
          # run_vbfret spawns the sidecar interpreter; here it is this same env.
          TETHER_SIDECAR_PYTHON_AUTO: "1"
        run: |
          export TETHER_SIDECAR_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          pytest -m sidecar -q
