#
# OpenSSF Scorecard (PRD §12.8) — supply-chain posture scoring. Scheduled and
# manual only: it is NOT a required status check, so it never blocks a PR. SARIF
# upload to code scanning works once CodeQL default setup is enabled (M0 S4).
name: Scorecard

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  branch_protection_rule:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: scorecard-analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload the Scorecard SARIF into GitHub code scanning.
      security-events: write
      # Required by ossf/scorecard-action to publish results via OIDC.
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF to code scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif
