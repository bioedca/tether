#
# Dependency vulnerability audit (PRD §12.6/§12.8). Scheduled and manual only —
# NOT a required status check. Dependabot watches pip + github-actions; this job
# audits the full locked scientific stack that Dependabot does not see. Advisory:
# findings are surfaced, never block (the conda locks are pin-and-hold, §4.1).
name: deps-audit

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Restore env + install tether
        uses: ./.github/actions/setup-env
      - name: Audit the locked environment (advisory)
        continue-on-error: true
        run: |
          python -m pip install pip-audit
          pip-audit --progress-spinner off
