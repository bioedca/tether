#
# schema-guard — the M0 HDF5 schema freeze gate (PRD §5/§9 M0/§12.6). It runs the
# builder that writes a real `.tether` (scripts/dump_schema.py --check), dumps the
# structure the code declares, and diffs it against the committed golden manifest
# schema/schema_frozen.json. Additions pass; a removed/renamed/retyped frozen
# field, a decremented schema_version, or a stale golden fail. A deliberate
# structural change bumps schema_version, carries an ADR, and regenerates the
# golden in the same PR. Required from M0 (promoted into the main-baseline ruleset
# once this workflow lands, mirroring sidecar/parity at M0.5).
name: schema-guard

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-guard:
    name: schema-guard
    runs-on: ubuntu-latest
    # Bound the gate: a hung --check (stuck import/IO) should fail fast, not hold
    # the runner to the 6-hour default.
    timeout-minutes: 10
    defaults:
      run:
        # Activate the restored micromamba env (init-shell: bash) so h5py/numpy
        # from the base conda-lock are importable.
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Restore env + install tether
        uses: ./.github/actions/setup-env
      - name: Verify the HDF5 schema freeze (declared vs golden)
        run: python scripts/dump_schema.py --check
