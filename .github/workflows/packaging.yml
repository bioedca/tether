# SPDX-License-Identifier: GPL-3.0-or-later
#
# packaging / installer — the M9 constructor installer build + offline install-smoke
# (ADR-0049, PRD §4.1, §9 M9). It renders the committed base + sidecar conda locks to
# per-platform EXPLICIT locks (pin-and-hold; no re-solve), builds the `tether` wheel
# and the pinned trimmed tMAVEN wheel, runs `constructor` to produce a self-contained
# 3-OS installer that bundles both environments offline, and install-smokes it.
#
# ADVISORY / NON-REQUIRED BY CONSTRUCTION: triggered ONLY by `workflow_dispatch`
# (never pull_request/push/merge_group), so it never reports a status on a PR and can
# never be — or silently become — a required merge check. Building + install-smoking a
# full napari/PySide6 + sidecar installer is heavy, network-bound and per-OS, so it
# cannot live in the required `test` matrix — the same posture as `deep-gpu.yml`
# (ADR-0047). tests/test_marker_contract.py locks this advisory shape.
#
# UNSIGNED: constructor leaves installers unsigned by default; Authenticode +
# productsign/notarization are wired with repository secrets in PR-2 (release.yml).
name: packaging

on:
  workflow_dispatch:
    inputs:
      tmaven_ref:
        description: >-
          Pinned tMAVEN git ref bundled into the sidecar env. Defaults to the
          NOTICE-recorded commit (Verma 2024, v0.3.0). tMAVEN is NOT a conda-lock
          dep — it is the GPL reference app, layered as an offline wheel.
        type: string
        default: "10f4230b6d13c6d2ad67b05d801696b4a40eff4a"
        required: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer:
    name: installer / ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux-64 }
          - { os: macos-latest, platform: osx-arm64 }
          # macos-15-intel is the x86_64 (Intel) hosted runner — macos-13 was
          # retired 2025-12-08; exercises the osx-64 lock/render/install-smoke path
          # the recipe also bundles.
          - { os: macos-15-intel, platform: osx-64 }
          - { os: windows-latest, platform: win-64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    defaults:
      run:
        # micromamba-activated login shell on every OS (git-bash on Windows).
        shell: bash -el {0}
    env:
      TMAVEN_SPEC: "git+https://github.com/GonzalezBiophysicsLab/tmaven.git@${{ inputs.tmaven_ref }}"
      # Bind matrix.platform to an env var (not inlined via ${{ }} in run scripts) —
      # the sidecar.yml template-injection-hygiene pattern. matrix IS available at
      # job level (unlike runner.*); it is a controlled literal, but this keeps the
      # run scripts off the ${{ }}-in-shell path.
      PLATFORM: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so hatch-vcs can derive the installer version from git.
          fetch-depth: 0

      - name: Provision the build env (constructor + conda-lock + build tools)
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          # Pin the micromamba binary so an advisory installer build never silently
          # re-resolves its own provisioner (pin-and-hold, PRD §4.1). Tag form from
          # mamba-org/micromamba-releases; the `-0` build suffix is REQUIRED. Held equal
          # to .github/actions/setup-env/action.yml and release.yml (contract-tested) —
          # see that file for the #306/#307 rationale.
          #
          # SCOPE, honestly: this env is SOLVED from create-args below, not restored from
          # a pin-and-held lock, so this pins the solver binary only. `constructor`,
          # `conda-standalone`, `python-build`, `pip` and `wheel` still float (only
          # conda-lock and setuptools are bounded) — pinning those is the change that
          # would actually make this build reproducible. Tracked separately.
          micromamba-version: "2.8.1-0"
          environment-name: pkgbuild
          # A build-only env, NOT one of the pin-and-held stacks: it just needs
          # constructor (>=3.16 for --render), conda-lock to render the committed
          # locks, and the wheel-build tools. `setuptools<81` still ships
          # `pkg_resources`, which tMAVEN imports (sidecar.yml precedent).
          # NOTE: setup-micromamba splits create-args on whitespace and passes
          # each token to micromamba verbatim — do NOT quote a match spec here or
          # the quotes reach libmamba ("Error parsing version" on setuptools<81"").
          # `pip` is explicit: `python -m build` (tether wheel) and `python -m pip
          # wheel` (tMAVEN) both require it and the base python pulls it in only by
          # chance, not as a stated dep.
          create-args: >-
            python=3.12
            constructor>=3.16
            conda-lock=4.0.1
            conda-standalone
            python-build
            pip
            setuptools<81
            wheel
          init-shell: bash
          cache-environment: true

      - name: Build the tether wheel (hatch-vcs version from git)
        run: python -m build --wheel --outdir packaging/staging .

      - name: Build the pinned trimmed tMAVEN wheel (offline sidecar payload)
        # --no-build-isolation so tMAVEN builds against the env's setuptools<81
        # (pkg_resources); --no-deps because the sidecar conda env provides them.
        run: python -m pip wheel --no-deps --no-build-isolation -w packaging/staging "${TMAVEN_SPEC}"

      - name: Stage the setuptools<81 wheel (restores pkg_resources in the sidecar)
        # tMAVEN's `maven_class.__init__` does `import pkg_resources`, which setuptools
        # 81.0.0 DEPRECATED (still shipped, `UserWarning`) and 82.0.0 REMOVED — and
        # sidecar/conda-lock.yml resolves setuptools 82.0.1 on every platform, i.e. past
        # the removal. The source path handles this with scripts/setup_sidecar.py's
        # SETUPTOOLS_PIN, applied by pip after the env is created; the installer had no
        # equivalent, so an installed app built the sidecar env fine and then failed at
        # the FIRST idealization (issue #212). Bundle the pin as a third offline wheel.
        # The bound is `<81`, not `<82`, because that is the bound setuptools' own
        # deprecation warning names ("pin to Setuptools<81") — one release of headroom.
        #
        # setuptools publishes a pure-Python `py3-none-any` wheel, so ONE file serves all
        # four platforms — no per-platform matrix entry needed. --only-binary=:all: keeps
        # this a download, never a build.
        # Block scalar, not an inline value: the trailing colon of `--only-binary=:all:`
        # plus the following space form a YAML `key: value` separator mid-line, and the
        # parser rejects the step outright (`ScannerError`).
        run: |
          python -m pip download --only-binary=:all: --no-deps \
            -d packaging/staging "setuptools<81"

      - name: Render per-platform EXPLICIT locks (pin-and-hold; no re-solve)
        # conda-lock render emits `conda-<platform>.lock` (@EXPLICIT) from the
        # committed unified locks; rename into the names construct.yaml expects.
        run: |
          mkdir -p packaging/locks
          cd packaging/locks
          conda-lock render -k explicit -p "$PLATFORM" ../../conda-lock.yml
          mv "conda-$PLATFORM.lock" "base-$PLATFORM.lock"
          conda-lock render -k explicit -p "$PLATFORM" ../../sidecar/conda-lock.yml
          mv "conda-$PLATFORM.lock" "sidecar-$PLATFORM.lock"

      - name: Stage the GPL license text + resolve wheel names
        # The installer ships Tether's GPL-3.0 text (NOTICE: tMAVEN's own license
        # ships too — a follow-up stages it alongside). Export the built wheel
        # basenames so construct.yaml's extra_files map to a known wheelhouse/ dest.
        run: |
          cp LICENSE packaging/staging/LICENSE.txt
          tether_whl="$(ls packaging/staging/tether-*.whl | head -1)"
          tmaven_whl="$(ls packaging/staging/tmaven-*.whl | head -1)"
          setuptools_whl="$(ls packaging/staging/setuptools-*.whl | head -1)"
          {
            echo "TETHER_VERSION=$(python -c 'import tether._version as v; print(v.__version__)' 2>/dev/null || git describe --tags --always | sed 's/^v//')"
            echo "TETHER_WHEEL=staging/$(basename "$tether_whl")"
            echo "TETHER_WHEEL_NAME=$(basename "$tether_whl")"
            echo "TMAVEN_WHEEL=staging/$(basename "$tmaven_whl")"
            echo "TMAVEN_WHEEL_NAME=$(basename "$tmaven_whl")"
            echo "SETUPTOOLS_WHEEL=staging/$(basename "$setuptools_whl")"
            echo "SETUPTOOLS_WHEEL_NAME=$(basename "$setuptools_whl")"
          } >> "$GITHUB_ENV"

      - name: Validate the recipe (offline render + schema)
        run: constructor --render packaging/

      - name: Build the installer
        # constructor auto-detects the bundled conda-standalone (the `conda-standalone`
        # package is in this build env), so no explicit --conda-exe is needed.
        run: constructor --output-dir packaging/dist packaging/

      - name: Install-smoke — offline install into a clean prefix (Unix)
        if: runner.os != 'Windows'
        # Networking is neutralised for the install + smoke so a bundled-offline
        # regression (any attempt to reach a channel/PyPI) fails loudly.
        env:
          PIP_NO_INDEX: "1"
          CONDA_OFFLINE: "1"
        run: |
          prefix="$RUNNER_TEMP/tether-smoke"
          if [ "$RUNNER_OS" = "macOS" ]; then
            pkg="$(ls packaging/dist/*.pkg | head -1)"
            installer -pkg "$pkg" -target CurrentUserHomeDirectory
            prefix="$HOME/Tether"
          else
            sh "$(ls packaging/dist/*.sh | head -1)" -b -p "$prefix"
          fi
          # Both runtime stacks are extra_envs (ADR-0049): the app lives in
          # envs/tether, the sidecar in envs/sidecar; `base` is only python+conda.
          "$prefix/envs/tether/bin/tether" --version
          "$prefix/envs/sidecar/bin/python" -c "import tmaven, PyQt5, numpy; assert numpy.__version__ < '2', numpy.__version__; print('sidecar OK', numpy.__version__)"
          # Importing tmaven is NOT enough. tMAVEN does `import pkg_resources` inside
          # `maven_class.__init__`, not at module import, so a sidecar whose setuptools
          # no longer ships pkg_resources (removed in 82.0.0; the lock resolves 82.0.1)
          # imports cleanly and then dies at the first idealization — exactly how issue
          # #212 reached a shipped installer past this smoke.
          #
          # Assert the pin FIRST: the run step is `bash -el {0}` (`-e`), so whichever
          # check fails first is the one the operator sees, and this one names the cause
          # instead of surfacing as an opaque probe failure. `import pkg_resources` is
          # the load-bearing half; the version bound pins the INTENT (the bundled wheel
          # was actually applied over the lock's setuptools) and is deliberately `< 81`,
          # matching the bundled `setuptools<81`, not the 82.0.0 breakage point.
          "$prefix/envs/sidecar/bin/python" -c "import setuptools, pkg_resources; assert tuple(int(p) for p in setuptools.__version__.split('.')[:1]) < (81,), setuptools.__version__; print('sidecar setuptools OK', setuptools.__version__)"
          # Then drive the real headless entry point the batch runner's startup probe
          # uses: it constructs maven_class and exits non-zero with a JSON status on
          # failure. Resolve the runner from the INSTALLED app env, not the checkout: at
          # runtime the driver launches `Path(driver.__file__).with_name("_sidecar_runner.py")`
          # (`_RUNNER`, src/tether/idealize/driver.py — the path supervisor.py hands the
          # sidecar interpreter), so probing the checkout copy would still pass if the
          # wheel never shipped it.
          runner="$("$prefix/envs/tether/bin/python" -c 'from tether.idealize.driver import _RUNNER; print(_RUNNER)')"
          "$prefix/envs/sidecar/bin/python" "$runner" --probe
          # The USER-FACING launch surface (ADR-0051). The absolute env paths above
          # prove the envs were built; these prove the app can actually be STARTED,
          # which is the thing an install guide has to document. Exercised through
          # the prefix shims, exactly as a user with <prefix>/bin on PATH would.
          test -x "$prefix/bin/tether" || { echo "missing shim: $prefix/bin/tether"; exit 1; }
          test -x "$prefix/bin/tether-gui" || { echo "missing shim: $prefix/bin/tether-gui"; exit 1; }
          PATH="$prefix/bin:$PATH" tether --version
          # The GUI entry point must import and answer --version WITHOUT a display;
          # `gui-scripts` on Unix is a normal console script, so this is safe headless.
          PATH="$prefix/bin:$PATH" tether-gui --version
          if [ "$RUNNER_OS" = "Linux" ]; then
            test -f "$HOME/.local/share/applications/tether.desktop" || {
              echo "missing desktop entry"; exit 1; }
          fi

      - name: Install-smoke — offline install into a clean prefix (Windows)
        if: runner.os == 'Windows'
        env:
          PIP_NO_INDEX: "1"
          CONDA_OFFLINE: "1"
          # Stop git-bash from mangling the NSIS /S and /D switches.
          MSYS2_ARG_CONV_EXCL: "*"
        run: |
          prefix="$RUNNER_TEMP\\tether-smoke"
          exe="$(ls packaging/dist/*.exe | head -1)"
          # NSIS silent install; /D (target dir, unquoted) must be the LAST arg.
          # Use `cmd /c` (single slash), NOT `//c`: MSYS2_ARG_CONV_EXCL='*' (set so
          # git-bash leaves /S and /D= intact) also stops git-bash rewriting //c to
          # /c, so `cmd //c` is NOT recognised and the installer would never run.
          cmd /c "$(cygpath -w "$exe") /S /D=$prefix"
          # The NSIS installer can return before the prefix is fully written, so
          # wait (bounded) for the app env interpreter to appear before smoking it.
          tether_py_u="$(cygpath -u "$prefix")/envs/tether/python.exe"
          for _ in $(seq 1 40); do [ -f "$tether_py_u" ] && break; sleep 3; done
          # Both runtime stacks are extra_envs (ADR-0049): the app lives in
          # envs\tether, the sidecar in envs\sidecar; `base` is only python+conda.
          "$prefix\\envs\\tether\\python.exe" -m tether --version
          "$prefix\\envs\\sidecar\\python.exe" -c "import tmaven, PyQt5, numpy; assert numpy.__version__ < '2', numpy.__version__; print('sidecar OK', numpy.__version__)"
          # Importing tmaven is NOT enough — see the Unix smoke for why (issue #212).
          # Same order as the Unix smoke and for the same reason: assert the pin first so
          # a regression names its cause, then drive the real headless entry point,
          # resolved from the INSTALLED app env exactly as the driver resolves it.
          "$prefix\\envs\\sidecar\\python.exe" -c "import setuptools, pkg_resources; assert tuple(int(p) for p in setuptools.__version__.split('.')[:1]) < (81,), setuptools.__version__; print('sidecar setuptools OK', setuptools.__version__)"
          runner="$("$prefix\\envs\\tether\\python.exe" -c 'from tether.idealize.driver import _RUNNER; print(_RUNNER)')"
          "$prefix\\envs\\sidecar\\python.exe" "$runner" --probe
          # The USER-FACING launch surface (ADR-0051). The absolute env path above
          # proves the env was built; these prove the app can actually be STARTED.
          prefix_u="$(cygpath -u "$prefix")"
          test -f "$prefix_u/bin/tether.bat" || { echo "missing shim: bin\\tether.bat"; exit 1; }
          test -f "$prefix_u/bin/tether-gui.bat" || { echo "missing shim: bin\\tether-gui.bat"; exit 1; }
          # [project.gui-scripts] must produce the console-less launcher; without it a
          # shortcut flashes a terminal on every start.
          test -f "$prefix_u/envs/tether/Scripts/tether-gui.exe" || {
            echo "missing tether-gui.exe — is [project.gui-scripts] declared?"; exit 1; }
          cmd /c "$prefix\\bin\\tether.bat" --version
          # Start Menu shortcut (created directly; menuinst cannot own a pip-installed
          # wheel — ADR-0051). Non-fatal: a locked-down runner profile may refuse it.
          ls "$APPDATA/Microsoft/Windows/Start Menu/Programs/Tether/Tether.lnk" \
            || echo "WARNING: Start Menu shortcut absent on this runner"

      - name: Upload the installer artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tether-installer-${{ matrix.platform }}
          path: packaging/dist/*
          if-no-files-found: warn
