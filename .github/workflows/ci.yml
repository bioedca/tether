#
# Tether CI — the merge gate (PRD §12.6). Required checks active from M0:
# lint, test (3-OS), pre-commit, commitlint, secret-scan, conda-lock-verify,
# docs-build. (schema-guard lands at M0 S6; sidecar/parity at M0.5 S4; codeql is
# enabled as GitHub default setup at S4.) Every `uses:` is pinned to a 40-char
# commit SHA with a `# vX` comment (never a moving tag); permissions default to
# read and are elevated per-job only where needed.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      # ruff pinned to match the .pre-commit-config ruff-pre-commit rev (v0.15.19).
      - name: Install ruff
        run: python -m pip install "ruff==0.15.19"
      - name: Ruff lint
        run: ruff check --output-format=github .
      - name: Ruff format check
        run: ruff format --check .

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: python -m pip install pre-commit
      - name: Run all hooks
        run: pre-commit run --all-files --show-diff-on-failure --color always

  commitlint:
    # PR-title Conventional-Commits gate: the squash title becomes the commit
    # message (PRD §12.2/§12.6). Only meaningful on pull_request events.
    name: commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: gitleaks (mirrors push protection)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  conda-lock-verify:
    name: conda-lock-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install conda-lock
        run: python -m pip install "conda-lock==4.0.1"
      - name: Verify base + sidecar locks match their environment.yml
        # `--check-input-hash` short-circuits the solve when the spec hash still
        # matches the lock; the authoritative gate is then `git diff`: a stale
        # lock would be regenerated and show a diff. conda is preinstalled on the
        # runner ($CONDA) so conda-lock never bootstraps a backend over the net.
        run: |
          set -euo pipefail
          echo "$CONDA/bin" >> "$GITHUB_PATH"
          export PATH="$CONDA/bin:$PATH"
          run_check() {
            set +e
            conda-lock lock --check-input-hash -f "$1" --lockfile "$2"
            local rc=$?
            set -e
            case "$rc" in
              0|4) echo "conda-lock ran for $1 (rc=$rc)";;
              *) echo "::error::conda-lock failed for $1 (rc=$rc) — cannot verify"; return 1;;
            esac
          }
          run_check environment.yml conda-lock.yml
          run_check sidecar/environment.yml sidecar/conda-lock.yml
          if ! git diff --exit-code conda-lock.yml sidecar/conda-lock.yml; then
            echo "::error::A committed lock no longer matches its environment.yml — re-run conda-lock and commit the result."
            exit 1
          fi
          echo "Both locks verified against their environment.yml."

  docs-build:
    name: docs-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install mkdocs (Material)
        run: python -m pip install mkdocs mkdocs-material
      - name: Build docs (strict)
        run: mkdocs build --strict

  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # micromamba's bash hook (init-shell: bash) activates the env in login
        # shells; on Windows this is Git Bash. Use it for every step so the
        # `tether` environment is active.
        shell: bash -el {0}
    env:
      QT_QPA_PLATFORM: offscreen
      NAPARI_ASYNC: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Restore env + install tether
        uses: ./.github/actions/setup-env
      - name: Install xvfb (Linux headless GL for napari)
        if: runner.os == 'Linux'
        shell: bash -e {0}
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Run tests
        run: |
          if [ "${RUNNER_OS}" = "Linux" ]; then
            xvfb-run -a pytest -v
          else
            pytest -v
          fi
