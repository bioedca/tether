#
# Tether CI — the merge gate (PRD §12.6). Required checks active from M0:
# lint, test (3-OS), pre-commit, commitlint, secret-scan, conda-lock-verify,
# docs-build. (schema-guard lands at M0 S6; sidecar/parity at M0.5 S4; codeql is
# enabled as GitHub default setup at S4.) Every `uses:` is pinned to a 40-char
# commit SHA with a `# vX` comment (never a moving tag); permissions default to
# read and are elevated per-job only where needed. Every checkout sets
# persist-credentials: false (no job pushes; keep the token out of git config).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      # ruff pinned to match the .pre-commit-config ruff-pre-commit rev (v0.15.19).
      - name: Install ruff
        run: python -m pip install "ruff==0.15.19"
      - name: Ruff lint
        run: ruff check --output-format=github .
      - name: Ruff format check
        run: ruff format --check .

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: python -m pip install pre-commit
      - name: Run all hooks
        run: pre-commit run --all-files --show-diff-on-failure --color always

  commitlint:
    # PR-title Conventional-Commits gate: the squash title becomes the commit
    # message (PRD §12.2/§12.6). Only meaningful on pull_request events.
    name: commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # gitleaks reads local history only; a full clone with no persisted token.
          fetch-depth: 0
          persist-credentials: false
      - name: gitleaks (mirrors push protection)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  conda-lock-verify:
    name: conda-lock-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install conda-lock
        run: python -m pip install "conda-lock==4.0.1"
      - name: Verify base + sidecar + deep locks match their environment.yml
        # `--check-input-hash` short-circuits the solve when the spec hash still
        # matches the lock; the authoritative gate is then `git diff`: a stale
        # lock would be regenerated and show a diff. conda is preinstalled on the
        # runner ($CONDA) so conda-lock never bootstraps a backend over the net.
        # The three isolated stacks (base GUI, tMAVEN sidecar, deep torch add-on)
        # are each pin-and-held and verified independently (ADR-0004/0047).
        run: |
          set -euo pipefail
          echo "$CONDA/bin" >> "$GITHUB_PATH"
          export PATH="$CONDA/bin:$PATH"
          run_check() {
            set +e
            conda-lock lock --check-input-hash -f "$1" --lockfile "$2"
            local rc=$?
            set -e
            case "$rc" in
              0|4) echo "conda-lock ran for $1 (rc=$rc)";;
              *) echo "::error::conda-lock failed for $1 (rc=$rc) — cannot verify"; return 1;;
            esac
          }
          run_check environment.yml conda-lock.yml
          run_check sidecar/environment.yml sidecar/conda-lock.yml
          run_check deep/environment.yml deep/conda-lock.yml
          if ! git diff --exit-code conda-lock.yml sidecar/conda-lock.yml deep/conda-lock.yml; then
            echo "::error::A committed lock no longer matches its environment.yml — re-run conda-lock and commit the result."
            exit 1
          fi
          echo "All three locks (base + sidecar + deep) verified against their environment.yml."

  docs-build:
    name: docs-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install mkdocs (Material)
        # Pinned toolchain shared with the release-time docs.yml publish so the
        # gate and the deploy build with an identical mkdocs/material/mike.
        run: python -m pip install -r requirements-docs.txt
      - name: Build docs (strict)
        run: mkdocs build --strict

  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # micromamba's bash hook (init-shell: bash) activates the env in login
        # shells; on Windows this is Git Bash. Use it for every step so the
        # `tether` environment is active.
        shell: bash -el {0}
    env:
      QT_QPA_PLATFORM: offscreen
      NAPARI_ASYNC: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore env + install tether
        uses: ./.github/actions/setup-env
      - name: Install xvfb (Linux headless GL for napari)
        if: runner.os == 'Linux'
        shell: bash -e {0}
        run: sudo apt-get update && sudo apt-get install -y xvfb
      # Test tooling is pip-installed on top of the locked runtime stack — the
      # same pattern as the lint (ruff) and docs-build (mkdocs) jobs. pytest is
      # pinned for a reproducible matrix; pytest-qt drives the `@pytest.mark.gui`
      # napari panel tests (M0 S8) against the locked napari/PySide6 stack, run
      # headless via QT_QPA_PLATFORM=offscreen (+ xvfb on Linux, below).
      - name: Install test tooling
        run: python -m pip install "pytest==9.1.1" "pytest-qt==4.5.0"
      # The `large` marker needs the Git-LFS gated tier, which the default
      # checkout does not pull (PLAN §2.1/§2.2) — exclude it from the required
      # matrix so a structural HDF5 fixture never gates on an LFS pull. The
      # `sidecar` marker drives the isolated tMAVEN env (numpy<2/PyQt5), which CI
      # does not build (M0.5 S1) — exclude it too; it is a dev-machine check. The
      # `deep` marker drives the isolated torch `deep/` env (ADR-0047), built only
      # on the non-required deep.yml leg — exclude it; the base app has no torch.
      - name: Run tests
        run: |
          if [ "${RUNNER_OS}" = "Linux" ]; then
            xvfb-run -a pytest -v -m "not large and not sidecar and not deep"
          else
            pytest -v -m "not large and not sidecar and not deep"
          fi
