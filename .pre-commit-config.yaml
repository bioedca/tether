#
# Pre-commit hooks for Tether. Pinned `rev`s are bumped deliberately
# (pin-and-hold, PRD §4.1); the CI `pre-commit` job runs the same hooks
# (PRD §12.6). Refresh with `pre-commit autoupdate`.
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # packaging/construct.yaml is a `constructor` recipe, not plain YAML: it
        # uses conda-build line selectors (`# [win]`) and Jinja, so the same key
        # (post_install, environment_file, installer_type) legitimately repeats
        # with different selectors — invalid as standalone YAML. constructor
        # renders it before use; validate with `constructor --render packaging/`.
        exclude: ^packaging/construct\.yaml$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.19
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse
